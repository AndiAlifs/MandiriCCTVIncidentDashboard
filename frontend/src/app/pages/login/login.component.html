<div class="login-wrapper">
  <div class="login-card">
    <div class="logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#388bfd"/>
        <path d="M10 15h20M10 20h20M10 25h20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span>Mandiri CCTV</span>
    </div>

    <h1>Sign in</h1>

    @if (error) {
      <div class="alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="submit()">
      <label>
        Username
        <input type="text" [(ngModel)]="username" name="username" autocomplete="username" required />
      </label>
      <label>
        Password
        <input type="password" [(ngModel)]="password" name="password" autocomplete="current-password" required />
      </label>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>
